<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Biblioteca Digital GJL</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: radial-gradient(circle at top, #28315c 0%, #090b13 55%);
        color: #f8f9fa;
        font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        text-align: center;
      }
      .container {
        max-width: 480px;
        padding: 32px;
        background: rgba(255, 255, 255, 0.06);
        border: 1px solid rgba(255, 255, 255, 0.12);
        border-radius: 24px;
        box-shadow: 0 24px 80px rgba(4, 16, 38, 0.25);
      }
      h1 {
        margin: 0 0 14px;
        font-size: 1.8rem;
      }
      p {
        margin: 0 0 20px;
        color: #c8d1e7;
        line-height: 1.7;
      }
      a {
        color: #7cc7ff;
        text-decoration: none;
        font-weight: 700;
      }
      .spinner {
        display: inline-block;
        width: 32px;
        height: 32px;
        border: 4px solid rgba(255, 255, 255, 0.18);
        border-top-color: #7cc7ff;
        border-radius: 999px;
        animation: spin 1s linear infinite;
        margin-bottom: 16px;
      }
      @keyframes spin {
        to { transform: rotate(360deg); }
      }
    </style>
    <script>
      setTimeout(() => {
        window.location.href = 'frontend/';
      }, 600);
    </script>
  </head>
  <body>
    <div class="container">
      <div class="spinner" aria-hidden="true"></div>
      <h1>Carregando Biblioteca Digital...</h1>
      <p>Você será redirecionado em breve para o frontend da Biblioteca GJL.</p>
      <p><a href="frontend/">Clique aqui se não redirecionar automaticamente.</a></p>
    </div>
  </body>
</html>
